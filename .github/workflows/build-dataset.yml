name: Build BestIP Dataset

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"
  push:
    branches:
      - main

concurrency:
  group: bestip-dataset-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-dataset:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      BUILD_CONCURRENCY: 8
      BUILD_MAX_SOURCE_BYTES: 1048576
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Syntax check
        run: npm run check

      - name: Unit test
        run: npm run unit

      - name: Build dataset
        run: npm run build:dataset

      - name: Verify generated artifacts
        run: |
          test -s artifacts/latest/all.txt
          test -s artifacts/latest/health.json
          test -s artifacts/latest/manifest.json
          test -s public/artifacts/latest/all.txt
          test -s public/artifacts/latest/manifest.json

      - name: Smoke test
        run: npm test

      - name: Upload dataset artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bestip-artifacts
          path: |
            artifacts/latest/
            public/artifacts/latest/
          retention-days: 14

      - name: Commit artifacts
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update bestip artifacts"
          file_pattern: |
            artifacts/latest/*
            public/artifacts/latest/*
